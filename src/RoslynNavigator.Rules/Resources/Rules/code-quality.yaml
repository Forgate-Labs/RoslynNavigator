# Code Quality Rules - Builtin Rule Pack
# Defines rules for code quality issues

rules:
  - id: cq-001
    title: Method should not return null without documentation
    severity: warning
    message: "Methods with nullable return types should have XML documentation"
    predicate:
      returns_null: true

  - id: cq-002
    title: Complex method should be refactored
    severity: warning
    message: "Methods with high cognitive complexity should be simplified"
    predicate:
      cognitive_complexity: 15

  - id: cq-003
    title: Method should have try-catch for external calls
    severity: warning
    message: "Methods calling external services should handle exceptions"
    predicate:
      calls_external: true
      not:
        has_try_catch: true

  - id: cq-004
    title: Database access should be filtered by tenant
    severity: error
    message: "Database queries should filter by tenant for multi-tenant security"
    predicate:
      accesses_db: true
      not:
        filters_by_tenant: true

  - id: cq-005
    title: Avoid excessive method parameters
    severity: info
    message: "Methods with more than 5 parameters should consider using a parameter object"
    predicate:
      calls: "*"

  - id: cq-006
    title: Public API should have XML documentation
    severity: info
    message: "Public methods should include XML documentation"
    predicate:
      calls: "*"
